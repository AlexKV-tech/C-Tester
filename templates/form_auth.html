<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <title>Test Zugang - Autorisierung</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        /* Custom CSS for the authorization form */
        body {
            background-color: #f8f9fa;
        }

        .auth-container {
            max-width: 400px;
            margin: 6rem auto;
            padding: 2rem;
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="auth-container shadow-sm">
        <h2 class="mb-4 text-center">Zugangscode eingeben</h2>

        {% if error %}
        <div class="alert alert-danger" role="alert">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" id="otpForm" novalidate>
            <div class="mb-3">
                <label for="code" class="form-label">Einmaliges Passwort (OTP)</label>
                <input type="text" class="form-control" id="code" name="code" placeholder="Code eingeben" required
                    maxlength="20" autocomplete="off" autofocus />
                <div class="invalid-feedback">
                    Bitte geben Sie den Zugangscode ein.
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                Zugang prüfen
            </button>
        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        (() => {
            'use strict';

            const form = document.getElementById('otpForm');
            form.addEventListener(
                'submit',
                event => {
                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    form.classList.add('was-validated');
                },
                false
            );
        })();
    </script>
</body>

</html>
