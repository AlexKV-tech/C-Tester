<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>C-Test ausfüllen</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', path='/styles/ctest_form_style.css') }}" rel="stylesheet">
</head>

<body>
    <div class="container py-5">
        <h1 class="mb-4">Füllen Sie den C-Test aus</h1>
        <form id="ctestForm" method="POST">
            <div id="ctestContainer" class="mb-4"></div>
            <button type="submit" class="btn btn-primary" id="submitBtn">Absenden</button>
        </form>
        <div id="responseMessage"></div>
    </div>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>


    <script>

        window.ctestText = {{ ctest_text | tojson | safe }};
        window.blanksMap = {{ blanks | tojson | safe }};
        window.testId = "{{ test_id }}";
        /*var ctestText = window.ctestText;
        var blanksMap = window.blanksMap;
        var testId = window.testId;*/
    </script>
    <script src="{{ url_for('static', path='/scripts/ctest_form.js') }}"></script>
</body>

</html>
